services:
  # PostgreSQL Database
  db:
    image: postgres:latest
    container_name: postgres
    restart: no
    environment:
      POSTGRES_USER: ${IMDB_DEMO_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${IMDB_DEMO_DB_PASS:-password}
      POSTGRES_DB: ${IMDB_DEMO_DB_NAME:-dev_imdb_demo}
    ports:
      - ${IMDB_DEMO_DB_PORT:-5432}:${IMDB_DEMO_DB_PORT:-5432}
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  postgres-data: