services:
  # PostgreSQL Database
  db:
    image: postgres:latest
    restart: always
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    ports:
      - ${IMDB_DEMO_DB_PORT}:${IMDB_DEMO_DB_PORT}
    environment:
      POSTGRES_USER: ${IMDB_DEMO_DB_USER}
      POSTGRES_PASSWORD: ${IMDB_DEMO_DB_PASS}
      POSTGRES_DB: ${IMDB_DEMO_DB_NAME}

volumes:
  postgres-data: